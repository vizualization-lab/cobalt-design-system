<!doctype html>
<html lang="en" data-co-base>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cobalt Workbench</title>
    <link rel="stylesheet" href="/workbench.css" />
    <script type="module">
      import '@cobalt/tokens/css';
      import '@cobalt/tokens/css/fonts';
      import '@cobalt/tokens/css/base';
      import '@cobalt/tokens/css/dark';

      async function loadPreview() {
        const params = new URLSearchParams(location.search);
        const component = params.get('component');

        if (!component) {
          document.getElementById('title').textContent = 'No component specified';
          document.getElementById('content').innerHTML =
            '<p>Add <code>?component=button</code> to the URL.</p>';
          return;
        }

        if (component === 'app-shell') {
          const dedicatedUrl = new URL('./app-shell.html', window.location.href);
          window.location.replace(dedicatedUrl.toString());
          return;
        }

        try {
          const preview = await import(`./previews/${component}.ts`);
          document.title = `${preview.title} — Cobalt Workbench`;
          document.getElementById('title').textContent = preview.title;
          const content = document.getElementById('content');
          content.innerHTML = preview.html;
          await preview.setup?.(content);
        } catch (err) {
          document.getElementById('title').textContent = 'Preview not found';
          document.getElementById('content').innerHTML =
            `<p>Could not load preview for <code>${component}</code>.</p><pre>${err}</pre>`;
        }
      }

      loadPreview();
    </script>
  </head>
  <body>
    <header class="wb-header">
      <a href="/" class="wb-back">&larr; Workbench</a>
      <h1 class="wb-title" id="title">Loading&hellip;</h1>
      <button class="wb-theme-toggle" id="theme-toggle">Toggle theme</button>
    </header>
    <main class="wb-main" id="content"></main>
    <script>
      document.getElementById('theme-toggle').addEventListener('click', () => {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
      });
    </script>
  </body>
</html>
